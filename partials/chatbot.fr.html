<!-- ───── Chatbot (assistant IA) ───── -->
<button class="cbot-fab" id="cbot-fab" aria-label="Ouvrir le chat">
  <svg class="icon-open" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
  <svg class="icon-close" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6L18 18M18 6L6 18"/></svg>
  <span class="cbot-fab-dot"></span>
</button>

<div class="cbot" id="cbot" role="dialog" aria-label="Assistant IA NSY">
  <div class="cbot-head">
    <div class="cbot-avatar">
      <span class="cbot-avatar-pulse"></span>
      <img src="public/nsy-logo.png" alt="NSY" class="cbot-avatar-img" />
    </div>
    <div class="cbot-head-info">
      <div class="cbot-name">Assistant NSY <span class="cbot-ai-badge" id="cbot-ai-badge" title="Assistant génératif ancré dans les données du site (RAG). Modèle hébergé en Union européenne.">IA</span></div>
      <div class="cbot-status" id="cbot-status"><span class="cbot-online"></span>En ligne · IA générative</div>
    </div>
    <button class="cbot-close" id="cbot-close" aria-label="Fermer">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6L18 18M18 6L6 18"/></svg>
    </button>
  </div>

  <div class="cbot-body" id="cbot-body">
    <div class="cbot-msg cbot-msg-assistant">
      <div class="cbot-msg-avatar"><img src="public/nsy-logo.png" alt="NSY" /></div>
      <div class="cbot-bubble">Bonjour 👋 Je suis l'assistant IA de NSY : je connais tout le site et je réponds dans votre langue. Services, expertises, méthodes, disponibilité — posez votre question librement.</div>
    </div>
  </div>

  <div class="cbot-suggestions" id="cbot-suggestions">
    <button class="cbot-chip">Quels sont vos services ?</button>
    <button class="cbot-chip">Quel est le tarif d'un site IA ?</button>
    <button class="cbot-chip">Travaillez-vous avec les banques ?</button>
    <button class="cbot-chip">Comment fonctionne cet assistant ?</button>
  </div>

  <div class="cbot-input">
    <input type="text" id="cbot-input" placeholder="Posez votre question…" maxlength="800" />
    <button class="cbot-send" id="cbot-send" aria-label="Envoyer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
    </button>
  </div>

  <div class="cbot-foot">
    <span id="cbot-note">Réponses générées par IA (Mistral, UE) · pas de données sensibles</span>
    <button id="cbot-escalate">Parler à Cédric →</button>
  </div>
</div>
